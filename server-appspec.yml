version: 0.0
os: linux
files:
  - source: /
    destination: /opt/server
    overwrite: yes
    pattern:
      - "**"
    except:
      - "node_modules/**"
      - ".git/**"
      - "*.log"
      - ".env*"
permissions:
  - object: /opt/server
    owner: server
    group: server
    mode: 755
    type:
      - directory
      - file
hooks:
  BeforeInstall:
    - location: scripts/stop_server.sh
      timeout: 300
      runas: root
  AfterInstall:
    - location: scripts/install_server_dependencies.sh
      timeout: 300
      runas: root
  ApplicationStart:
    - location: scripts/start_server.sh
      timeout: 300
      runas: root
  ApplicationStop:
    - location: scripts/stop_server.sh
      timeout: 300
      runas: root
  ValidateService:
    - location: scripts/validate_server.sh
      timeout: 300
      runas: root